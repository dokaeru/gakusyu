<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HSK Smart Learning App</title>
    <style>
        :root { --blue: #1cb0f6; --green: #58cc02; --gray: #e5e5e5; --red: #ff4b4b; --orange: #ff9600; }
        body { font-family: sans-serif; margin: 0; background: #fff; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }

        .header { width: 100%; border-bottom: 2px solid var(--gray); padding: 10px 0; text-align: center; background: white; position: sticky; top: 0; z-index: 100; }
        .nav { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; }
        .nav button { padding: 8px 12px; border: 2px solid var(--gray); border-radius: 12px; background: white; font-weight: bold; cursor: pointer; }
        .nav button.active { background: var(--blue); color: white; border-color: var(--blue); }
        .rem-count { font-size: 0.7rem; color: #888; margin-top: 2px; }

        .mode-switch { margin-bottom: 10px; }
        .mode-switch button { padding: 5px 15px; border-radius: 20px; border: 1px solid var(--gray); background: #f9f9f9; cursor: pointer; font-size: 0.8rem; }
        .mode-switch button.active { background: var(--orange); color: white; border-color: var(--orange); font-weight: bold; }

        .main { width: 95%; max-width: 600px; margin-top: 10px; text-align: center; }
        .question { font-size: 1.5rem; font-weight: bold; margin: 15px 0; color: #3c3c3c; min-height: 2.2em; display: flex; flex-direction: column; justify-content: center; }
        .q-sub { font-size: 0.9rem; color: #777; font-weight: normal; margin-top: 4px; }

        .box-container { min-height: 320px; display: flex; flex-direction: column; gap: 5px; }
        .label { font-size: 0.8rem; color: #aaa; text-align: left; margin-left: 5px; }

        #ans-box { min-height: 110px; border: 2px solid var(--gray); border-radius: 10px; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px; padding: 10px; background-color: #fafafa; box-sizing: border-box; }
        #ans-box.correct { border-color: var(--green); background-color: #f0fff0; }
        #ans-box.wrong { border-color: var(--red); background-color: #fff1f1; }

        .feedback-area { height: 35px; margin: 5px 0; display: flex; align-items: center; justify-content: center; }
        #feedback-msg { font-weight: bold; visibility: hidden; width: 100%; padding: 0 10px; box-sizing: border-box; font-size: 0.9rem; }
        .msg-correct { color: var(--green); }
        .msg-wrong { color: var(--red); }

        #cho-box { min-height: 120px; background: #f1f1f1; border-radius: 18px; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 12px; padding: 15px; box-sizing: border-box; }

        .word { background: white; border: 2px solid var(--gray); border-radius: 15px; padding: 10px 16px; cursor: pointer; box-shadow: 0 4px 0 var(--gray); display: inline-flex; flex-direction: column; align-items: center; user-select: none; }
        .word:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--gray); }
        .word.disabled { pointer-events: none; opacity: 0.7; }
        
        ruby { font-size: 24px; pointer-events: none; }
        rt { font-size: 12px; color: #777; pointer-events: none; }

        .footer { margin-top: 20px; display: flex; flex-direction: column; align-items: center; }
        #self-eval { display: none; margin-bottom: 15px; background: #f9f9f9; padding: 10px; border-radius: 15px; border: 1px dashed #ccc; width: 100%; max-width: 350px; }
        #self-eval p { font-size: 0.8rem; color: #666; margin: 0 0 8px 0; }
        .eval-btns { display: flex; gap: 10px; justify-content: center; }
        .eval-btns button { padding: 8px 15px; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; font-size: 0.85rem; }
        
        #main-btn { padding: 18px 80px; font-size: 1.2rem; font-weight: bold; background: var(--green); color: white; border: none; border-radius: 20px; cursor: pointer; box-shadow: 0 5px 0 #469b02; width: 300px; }
        #main-btn.next { background: var(--blue); box-shadow: 0 5px 0 #1899d6; }
        #main-btn:disabled { background: var(--gray); box-shadow: none; cursor: default; }
    </style>
</head>
<body>

    <div class="header">
        <div class="mode-switch">
            <button id="mode-normal" class="active" onclick="setMode('normal')">日→中 (作文)</button>
            <button id="mode-reverse" onclick="setMode('reverse')">中→日 (読解)</button>
        </div>
        <div class="nav">
            <div class="nav-item"><button onclick="changeLevel(1)" id="l1">1級</button><div id="count1" class="rem-count">-</div></div>
            <div class="nav-item"><button onclick="changeLevel(2)" id="l2">2級</button><div id="count2" class="rem-count">-</div></div>
            <div class="nav-item"><button onclick="changeLevel(3)" id="l3">3級</button><div id="count3" class="rem-count">-</div></div>
            <div class="nav-item"><button onclick="changeLevel(4)" id="l4">4級</button><div id="count4" class="rem-count">-</div></div>
        </div>
    </div>

    <div class="main">
        <div id="q-txt" class="question">読み込み中...</div>
        <div class="box-container">
            <div class="label">解答欄</div>
            <div id="ans-box"></div>
            <div class="feedback-area"><div id="feedback-msg"></div></div>
            <div class="label">選択肢</div>
            <div id="cho-box"></div>
        </div>
        <div class="footer">
            <div id="self-eval">
                <p>単語は合っています。意味が通じるなら正解にできます：</p>
                <div class="eval-btns">
                    <button onclick="overrideResult(true)" style="background:var(--green);">正解にする</button>
                    <button onclick="overrideResult(false)" style="background:var(--red);">不正解にする</button>
                </div>
            </div>
            <button id="main-btn" onclick="handleButtonClick()">回答する</button>
        </div>
    </div>

        function saveProg(data) { localStorage.setItem(currentMode === 'normal' ? 'hsk_n' : 'hsk_r', JSON.stringify(data)); }
        function speak(t) { const u = new SpeechSynthesisUtterance(t); u.lang = 'zh-CN'; window.speechSynthesis.speak(u); }

        function setMode(m) { currentMode = m; document.getElementById('mode-normal').className = m==='normal'?'active':''; document.getElementById('mode-reverse').className = m==='reverse'?'active':''; startNextProblem(); }

        function updateCounts() {
            const prog = getProg(), now = Date.now();
            for (let i = 1; i <= 4; i++) {
                if(!DB[i]) continue;
                const rem = DB[i].filter(p => !prog[p.id] || prog[p.id].nextReview <= now).length;
                document.getElementById(`count${i}`).innerText = `残り: ${rem}`;
            }
        }

            updateCounts();

            document.getElementById("self-eval").style.display = "none";

            const btn = document.getElementById("main-btn"), aBox = document.getElementById("ans-box"), fb = document.getElementById("feedback-msg");
            
            aBox.innerHTML = ""; document.getElementById("cho-box").innerHTML = ""; aBox.className = ""; fb.style.visibility = "hidden";

       function renderChoices() {
            const cBox = document.getElementById("cho-box"), aBox = document.getElementById("ans-box");
            const isNormal = (currentMode === 'normal');
            const targetWordObjs = isNormal ? prob.w_zh : prob.w_jp;
            
            // 1. 正解に必要な単語をすべて入れる（重複を許容する）
            let choicePool = targetWordObjs.map(obj => {
                const word = isNormal ? obj.h : (obj.j || obj.h);
                return {
                    text: word,
                    key: word,
                    pinyin: isNormal ? (obj.p || "") : ""
                };
            });

            // 2. ダミー単語を生成して追加（ダミーは正解や他のダミーと被らないようにする）
            targetWordObjs.forEach(tw => {
                const candidates = (MASTER[currentLv] || []).filter(m => {
                    const mWord = isNormal ? m.h : (m.j || m.h);
                    const twWord = isNormal ? tw.h : (tw.j || tw.h);
                    // 品詞が同じ、かつ、この問題の正解単語リストに含まれていないものをダミーにする
                    const isNotCorrectWord = !targetWordObjs.some(target => (isNormal ? target.h : (target.j || target.h)) === mWord);
                    return m.t === tw.t && isNotCorrectWord;
                });
                
                if (candidates.length > 0) {
                    const dummyObj = candidates[Math.floor(Math.random() * candidates.length)];
                    const word = isNormal ? dummyObj.h : (dummyObj.j || dummyObj.h);
                    
                    // ダミーがすでにプールにある場合は追加しない（選択肢が溢れるのを防ぐ）
                    if (!choicePool.some(c => c.text === word)) {
                        choicePool.push({
                            text: word,
                            key: word,
                            pinyin: isNormal ? (dummyObj.p || "") : ""
                        });
                    }
                }
            });

            // 3. シャッフル（重複を消す Set は使わない！）
            const finalPool = choicePool.sort(() => Math.random() - 0.5);

            // 4. ボタン生成
            finalPool.forEach((item, index) => {
                const b = document.createElement("div");
                b.className = "word";
                // dataset.k にインデックスを混ぜることで、同じ単語でも別々の要素として扱う
                b.dataset.k = item.key;
                b.id = "word-" + index; 

                if (isNormal) {
                    let displayPinyin = item.pinyin;
                    if (!displayPinyin) {
                        const mData = (MASTER[currentLv] || []).find(m => m.h === item.text);
                        if (mData) displayPinyin = mData.p;
                    }
                    b.innerHTML = `<ruby>${item.text}<rt>${displayPinyin || ''}</rt></ruby>`;
                } else {
                    b.innerText = item.text;
                }

                b.onclick = function() {
                    if(isAnswered) return;
                    if (this.parentNode === cBox) { 
                        if(isNormal) speak(item.text); 
                        aBox.appendChild(this); 
                    } else {
                        cBox.appendChild(this);
                    }
                };
                cBox.appendChild(b);
            });
        }
        function handleButtonClick() { if (isAnswered) startNextProblem(); else check(); }

        function check() {
            const aBox = document.getElementById("ans-box"), fb = document.getElementById("feedback-msg"), btn = document.getElementById("main-btn");
            const selected = Array.from(aBox.children).map(el => el.dataset.k);
            const userStr = selected.join("");
            const target = currentMode === 'normal' ? prob.a_zh : prob.a_jp;
            const targetWords = currentMode === 'normal' ? prob.w_zh.map(w => w.h) : prob.w_jp.map(w => w.j || w.h);

            isAnswered = true;
            document.querySelectorAll('.word').forEach(w => w.classList.add('disabled'));
            fb.style.visibility = "visible";

            if (userStr === target) {
                aBox.className = "correct";
                fb.innerHTML = `<span class="msg-correct">正解 ✨：${target}</span>`;
                if(currentMode === 'normal') speak(prob.a_zh);
                updateReview(true);
            } else {
                aBox.className = "wrong";
                fb.innerHTML = `<span class="msg-wrong">不正解（正答: ${target}）</span>`;
                updateReview(false);

                // 条件：読解モード かつ 単語のセットは合っている
                if (currentMode === 'reverse' && isSameWords(selected, targetWords)) {
                    document.getElementById("self-eval").style.display = "block";
                }
            }
            btn.innerText = "次へ進む"; btn.classList.add("next");
            updateCounts();
        }

        function isSameWords(arr1, arr2) {
            if (arr1.length !== arr2.length) return false;
            return [...arr1].sort().join() === [...arr2].sort().join();
        }

        function overrideResult(isCorrect) {
            const aBox = document.getElementById("ans-box"), fb = document.getElementById("feedback-msg");
            const target = currentMode === 'normal' ? prob.a_zh : prob.a_jp;
            if (isCorrect) {
                aBox.className = "correct";
                fb.innerHTML = `<span class="msg-correct">正解として記録 ✨：${target}</span>`;
            } else {
                aBox.className = "wrong";
                fb.innerHTML = `<span class="msg-wrong">不正解として記録（正答: ${target}）</span>`;
            }
            document.getElementById("self-eval").style.display = "none";
            updateReview(isCorrect);
            updateCounts();
        }

        function updateReview(isCorrect) {
            let prog = getProg();
            if (!prog[prob.id]) prog[prob.id] = { step: 0, nextReview: 0 };
            prog[prob.id].step = isCorrect ? Math.min(prog[prob.id].step + 1, INTERVALS.length - 1) : 0;
            const wait = (INTERVALS[prog[prob.id].step] * 24 * 60 * 60 * 1000) - (MINUS_HOURS * 60 * 60 * 1000);
            prog[prob.id].nextReview = Date.now() + Math.max(0, wait);
            saveProg(prog);
        }

        window.onload = () => startNextProblem();
    </script>
</body>
</html>
